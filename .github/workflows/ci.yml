name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync
      - name: Lint (ruff + black --check)
        run: |
          uv run ruff check .
          uv run black --check .
      - name: Unit + contract tests (Levels 1-2, no GPU)
        run: uv run pytest -m "not integration" -q
      - name: Integration tests against mocks (Level 3, no GPU)
        run: uv run pytest -m integration -q

  serving-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv sync
      - name: C2 + C5 against the mock LLM (boots server, checks health, runs bench)
        run: uv run python scripts/gate0_mock.py
      - name: Upload baseline artifact
        uses: actions/upload-artifact@v4
        with:
          name: baseline-metrics
          path: eval/results/baseline.json
